{{ define "head.html" }}
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ .Page.Title }} · {{ .SiteTitle }}</title>
{{ if .Page.Description }}<meta name="description" content="{{ .Page.Description }}">{{ end }}
<meta name="pagefind:title" content="{{ .Page.Title }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/js/vendor/highlight/tokyo-night-dark.min.css">
<link rel="stylesheet" href="/assets/css/style.css">
{{ end }}
